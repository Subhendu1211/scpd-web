name: Azure Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scpd
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scpd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Ensure backend base schema
        working-directory: backend
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: scpd
          PGUSER: postgres
          PGPASSWORD: postgres
        run: node --input-type=module -e "import { ensureBaseCmsSchema } from './src/models/ensureSchema.js'; await ensureBaseCmsSchema();"

      - name: Run backend schema checks
        working-directory: backend
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: scpd
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          node scripts/check_defaults.js
          node scripts/check_media_schema.js

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare combined web app package (backend + frontend dist)
        run: |
          rm -rf package
          mkdir -p package
          cp -R backend/. package/
          rm -f package/.env package/.env.*
          rm -rf package/public
          mkdir -p package/public
          cp -R frontend/dist/. package/public/

      - name: Upload web app package artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: package
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download web app package artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: package

      - name: Extract app name from publish profile
        id: azure_app
        shell: bash
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          app_name="$(printf '%s' "$AZURE_WEBAPP_PUBLISH_PROFILE" | tr -d '\n' | sed -n 's/.*msdeploySite="\([^"]*\)".*/\1/p')"
          if [ -z "$app_name" ]; then
            echo "Unable to extract msdeploySite from AZURE_WEBAPP_PUBLISH_PROFILE."
            exit 1
          fi
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"

      - name: Deploy backend (with bundled frontend) to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.azure_app.outputs.app_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: package

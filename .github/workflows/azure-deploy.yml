name: Azure Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scpd
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scpd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Ensure backend base schema
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scpd
          DB_USER: postgres
          DB_PASS: postgres
        run: node --input-type=module -e "import { ensureBaseCmsSchema } from './src/models/ensureSchema.js'; await ensureBaseCmsSchema();"

      - name: Run backend schema checks
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scpd
          DB_USER: postgres
          DB_PASS: postgres
        run: |
          node scripts/check_defaults.js
          node scripts/check_media_schema.js

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build to backend/public
        run: |
          rm -rf backend/public
          mkdir -p backend/public
          cp -R frontend/dist/. backend/public/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app

      - name: Extract app name from publish profile
        id: azure_app
        shell: bash
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          app_name="$(printf '%s' "$AZURE_WEBAPP_PUBLISH_PROFILE" | tr -d '\n' | sed -n 's/.*msdeploySite="\([^"]*\)".*/\1/p')"
          if [ -z "$app_name" ] && [ -n "$AZURE_WEBAPP_NAME" ]; then
            echo "Using AZURE_WEBAPP_NAME fallback from secret."
            app_name="$AZURE_WEBAPP_NAME"
          fi
          if [ -z "$app_name" ]; then
            echo "Unable to extract msdeploySite from AZURE_WEBAPP_PUBLISH_PROFILE or AZURE_WEBAPP_NAME fallback."
            exit 1
          fi
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"

      - name: Deploy backend (with bundled frontend) to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.azure_app.outputs.app_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: node-app/backend
          slot-name: Production
